<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finger Picker">
<meta name="theme-color" content="#08080f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Finger Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #08080f;
  --surface: #11111c;
  --border: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.9);
  --muted: rgba(255,255,255,0.35);
}

body {
  background: var(--bg);
  width: 100vw;
  height: 100vh;
  height: -webkit-fill-available;
  overflow: hidden;
  font-family: 'Unbounded', sans-serif;
  touch-action: none;
  user-select: none;
  color: var(--text);
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.35s ease, transform 0.35s ease;
  padding: 24px;
  padding-top: max(24px, env(safe-area-inset-top));
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}
.screen.hidden { opacity:0; pointer-events:none; transform:scale(0.97); }

/* ── SETUP ── */
#setup-screen { gap:0; justify-content:flex-start; padding-top: max(60px, env(safe-area-inset-top) + 20px); }

.setup-header { text-align:center; margin-bottom:28px; }
.setup-logo { font-size:52px; margin-bottom:8px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.setup-title { font-size:24px; font-weight:900; letter-spacing:-1px; }
.setup-sub { font-size:10px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:4px; }

.mode-toggle {
  display:flex; background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:4px; gap:4px; margin-bottom:20px;
  width:100%; max-width:340px;
}
.mode-btn {
  flex:1; padding:11px; border-radius:12px; border:none; background:transparent;
  color:var(--muted); font-family:'Unbounded',sans-serif; font-size:11px;
  font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
}
.mode-btn.active { background:white; color:#08080f; }

.players-container {
  width:100%; max-width:340px; display:flex; flex-direction:column;
  gap:8px; max-height:260px; overflow-y:auto; margin-bottom:12px;
}
.players-container::-webkit-scrollbar { display:none; }

.player-row {
  display:flex; align-items:center; gap:10px; background:var(--surface);
  border:1px solid var(--border); border-radius:14px; padding:10px 14px;
  animation: row-in 0.2s ease;
}
@keyframes row-in { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }

.player-color-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.player-input {
  flex:1; background:transparent; border:none; outline:none;
  font-family:'Unbounded',sans-serif; font-size:13px; color:var(--text);
}
.player-input::placeholder { color:var(--muted); }
.player-delete { background:transparent; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; }

.add-player-btn {
  width:100%; max-width:340px; padding:11px; background:transparent;
  border:1px dashed rgba(255,255,255,0.12); border-radius:14px; color:var(--muted);
  font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-bottom:16px;
}

.start-btn {
  width:100%; max-width:340px; padding:18px; background:white; border:none;
  border-radius:18px; color:#08080f; font-family:'Unbounded',sans-serif;
  font-size:13px; font-weight:900; letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; transition:transform 0.15s;
}
.start-btn:active { transform:scale(0.97); }

.scoreboard-link {
  margin-top:14px; font-size:11px; color:var(--muted); letter-spacing:1px;
  text-transform:uppercase; cursor:pointer; text-decoration:underline; text-underline-offset:3px;
}

/* ── GAME ── */
#game-screen { padding:0; }

.game-topbar {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding: max(20px, env(safe-area-inset-top) + 8px) 20px 0;
  z-index:10; pointer-events:none;
}
.game-back {
  pointer-events:all; background:rgba(255,255,255,0.06);
  border:1px solid var(--border); border-radius:100px; padding:8px 16px;
  font-size:10px; color:var(--muted); font-family:'Unbounded',sans-serif;
  font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}
.finger-count-badge {
  background:rgba(255,255,255,0.06); border:1px solid var(--border);
  border-radius:100px; padding:8px 16px; font-size:10px; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
}
.game-hint {
  position:absolute; bottom:max(40px, env(safe-area-inset-bottom) + 20px);
  left:50%; transform:translateX(-50%); font-size:11px; color:rgba(255,255,255,0.18);
  letter-spacing:2px; text-transform:uppercase; white-space:nowrap; pointer-events:none; transition:opacity 0.3s;
}

#progress-bar {
  position:absolute; bottom:0; left:0; height:3px;
  background:white; width:0%; opacity:0.4; display:none;
}

#countdown-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.countdown-number { font-size:220px; font-weight:900; color:white; opacity:0; transform:scale(1.5); transition:none; line-height:1; }
.countdown-number.show { opacity:0.06; transform:scale(1); transition:opacity 0.1s, transform 0.6s cubic-bezier(0.34,1.56,0.64,1); }

.finger-dot {
  position:absolute; border-radius:50%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; transform:translate(-50%,-50%) scale(0);
  animation:dot-pop 0.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
  pointer-events:none; border:2px solid;
}
@keyframes dot-pop { to{transform:translate(-50%,-50%) scale(1)} }
.dot-number { font-size:22px; font-weight:900; color:white; line-height:1; }
.dot-name { font-size:9px; color:rgba(255,255,255,0.7); max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }

.finger-dot.winner-anim { animation:winner-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; z-index:20; }
@keyframes winner-pop { 0%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.5)} 100%{transform:translate(-50%,-50%) scale(1.25)} }
.finger-dot.loser-anim { animation:loser-out 0.3s ease-in forwards; }
@keyframes loser-out { to{transform:translate(-50%,-50%) scale(0);opacity:0} }

.ripple-ring {
  position:absolute; border-radius:50%; border:2px solid;
  transform:translate(-50%,-50%) scale(1); animation:ripple-expand 0.7s ease-out forwards; pointer-events:none;
}
@keyframes ripple-expand { to{transform:translate(-50%,-50%) scale(3.5);opacity:0} }

/* ── WINNER ── */
#winner-screen { gap:10px; z-index:100; }

.winner-avatar {
  width:120px; height:120px; border-radius:50%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; border:3px solid; margin-bottom:8px;
  animation:avatar-in 0.5s cubic-bezier(0.34,1.56,0.64,1); position:relative;
}
@keyframes avatar-in { from{transform:scale(0) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
.winner-avatar::before {
  content:'👑'; position:absolute; top:-30px; font-size:30px;
  animation:crown-drop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes crown-drop { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }

.winner-label { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--muted); animation:fade-up 0.4s ease 0.2s both; }
.winner-avatar-num { font-size:40px; font-weight:900; color:white; line-height:1; }
.winner-avatar-name { font-size:10px; color:rgba(255,255,255,0.7); max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:3px; }
.winner-title { font-size:34px; font-weight:900; letter-spacing:-1px; animation:fade-up 0.4s ease 0.3s both; text-align:center; }

@keyframes fade-up { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }

.winner-actions { display:flex; gap:10px; margin-top:24px; animation:fade-up 0.4s ease 0.5s both; }
.btn-primary {
  padding:14px 28px; background:white; color:#08080f; border:none; border-radius:100px;
  font-family:'Unbounded',sans-serif; font-size:11px; font-weight:900; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}
.btn-secondary {
  padding:14px 28px; background:transparent; color:var(--muted); border:1px solid var(--border);
  border-radius:100px; font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}

/* ── SCOREBOARD ── */
#score-screen { justify-content:flex-start; padding-top:max(60px, env(safe-area-inset-top) + 20px); gap:0; }
.score-header { text-align:center; margin-bottom:24px; }
.score-title { font-size:20px; font-weight:900; }
.score-sub { font-size:10px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:4px; }

.score-list { width:100%; max-width:340px; display:flex; flex-direction:column; gap:8px; max-height:380px; overflow-y:auto; margin-bottom:20px; }
.score-list::-webkit-scrollbar { display:none; }

.score-row { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:12px 16px; }
.score-rank { font-size:16px; width:24px; text-align:center; }
.score-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.score-name { flex:1; font-size:12px; font-weight:700; }
.score-wins { font-size:20px; font-weight:900; }
.score-wins-label { font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-left:3px; }
.score-empty { text-align:center; color:var(--muted); font-size:12px; padding:40px 0; }

/* Confetti */
.confetti-piece {
  position:fixed; top:-20px; pointer-events:none; z-index:999;
  animation:confetti-fall linear forwards;
}
@keyframes confetti-fall {
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* Install banner */
#install-banner {
  position:fixed; bottom: max(20px, env(safe-area-inset-bottom) + 8px);
  left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.1); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15); border-radius:16px;
  padding:12px 20px; display:flex; align-items:center; gap:10px;
  font-size:11px; color:white; z-index:1000; white-space:nowrap;
  animation:banner-in 0.4s ease 2s both;
}
@keyframes banner-in { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
.banner-close { background:transparent; border:none; color:rgba(255,255,255,0.5); font-size:16px; cursor:pointer; margin-left:8px; }
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen" id="setup-screen">
  <div class="setup-header">
    <div class="setup-logo">👆</div>
    <div class="setup-title">Finger Picker</div>
    <div class="setup-sub">wie is de winnaar?</div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-numbers" onclick="setMode('numbers')">Nummers</button>
    <button class="mode-btn" id="mode-names" onclick="setMode('names')">Namen</button>
  </div>

  <div class="players-container" id="players-container" style="display:none"></div>
  <button class="add-player-btn" id="add-player-btn" style="display:none" onclick="addPlayer()">+ Speler toevoegen</button>

  <button class="start-btn" onclick="startGame()">Spelen 🎮</button>
  <div class="scoreboard-link" onclick="showScore()">🏆 Scorebord</div>
</div>

<!-- GAME -->
<div class="screen hidden" id="game-screen">
  <div class="game-topbar">
    <button class="game-back" onclick="goBack()">← Terug</button>
    <div class="finger-count-badge" id="finger-count-badge">Leg vingers neer</div>
  </div>
  <div id="countdown-overlay">
    <div class="countdown-number" id="countdown-number">3</div>
  </div>
  <div class="game-hint" id="game-hint">Leg 2+ vingers op het scherm</div>
  <div id="progress-bar"></div>
</div>

<!-- WINNER -->
<div class="screen hidden" id="winner-screen">
  <div class="winner-label">De winnaar is</div>
  <div class="winner-avatar" id="winner-avatar">
    <div class="winner-avatar-num" id="winner-avatar-num">1</div>
    <div class="winner-avatar-name" id="winner-avatar-name" style="display:none"></div>
  </div>
  <div class="winner-title" id="winner-title">Speler 1</div>
  <div class="winner-actions">
    <button class="btn-primary" onclick="playAgain()">Opnieuw</button>
    <button class="btn-secondary" onclick="showScore()">Scorebord</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div class="screen hidden" id="score-screen">
  <div class="score-header">
    <div class="score-title">🏆 Scorebord</div>
    <div class="score-sub">Alle rondes</div>
  </div>
  <div class="score-list" id="score-list"></div>
  <button class="btn-primary" onclick="showScreen('setup-screen')">Terug</button>
  <button class="btn-secondary" style="margin-top:10px" onclick="clearScores()">Reset scores</button>
</div>

<!-- Install banner (iOS) -->
<div id="install-banner" style="display:none">
  <span>📲</span>
  <span>Voeg toe aan beginscherm voor app-ervaring</span>
  <button class="banner-close" onclick="document.getElementById('install-banner').style.display='none'">×</button>
</div>

<script>
// ── COLORS & STATE ──
const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6BD6','#FF9F43','#48DBFB','#A29BFE','#fd79a8','#00b894','#e17055','#74b9ff'];

let mode = 'numbers';
let players = [
  {name:'Speler 1', color:COLORS[0]},
  {name:'Speler 2', color:COLORS[1]},
];
let scores = {};
let touches = {};
let state = 'idle';
let countdownTimer = null;
let fingerCount = 0;

try { const s = localStorage.getItem('fp_scores'); if(s) scores = JSON.parse(s); } catch(e){}

// ── PWA INSTALL ──
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone) {
  setTimeout(() => {
    document.getElementById('install-banner').style.display = 'flex';
  }, 3000);
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── AUDIO ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.12) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e){}
}
function soundTap()      { playTone(440,'sine',0.08,0.1); }
function soundCountdown(){ playTone(330,'triangle',0.12,0.15); }
function soundWinner()   {
  playTone(523,'sine',0.15,0.2);
  setTimeout(()=>playTone(659,'sine',0.15,0.2),150);
  setTimeout(()=>playTone(784,'sine',0.3,0.3),280);
}
function soundLoser()    { playTone(180,'sawtooth',0.2,0.08); }
function vibe(p)         { try{navigator.vibrate&&navigator.vibrate(p);}catch(e){} }

// ── SETUP ──
function setMode(m) {
  mode = m;
  document.getElementById('mode-numbers').classList.toggle('active', m==='numbers');
  document.getElementById('mode-names').classList.toggle('active', m==='names');
  document.getElementById('players-container').style.display = m==='names'?'flex':'none';
  document.getElementById('add-player-btn').style.display = m==='names'?'block':'none';
  if(m==='names') renderPlayers();
}

function renderPlayers() {
  const c = document.getElementById('players-container');
  c.innerHTML = '';
  players.forEach((p,i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <div class="player-color-dot" style="background:${p.color}"></div>
      <input class="player-input" type="text" placeholder="Naam speler ${i+1}"
        value="${p.name}" maxlength="16" oninput="players[${i}].name=this.value">
      ${players.length>2?`<button class="player-delete" onclick="removePlayer(${i})">×</button>`:''}
    `;
    c.appendChild(row);
  });
}

function addPlayer() {
  if(players.length>=12) return;
  players.push({name:`Speler ${players.length+1}`, color:COLORS[players.length%COLORS.length]});
  renderPlayers();
}

function removePlayer(i) {
  if(players.length<=2) return;
  players.splice(i,1);
  renderPlayers();
}

function startGame() {
  showScreen('game-screen');
  clearDots();
  touches = {}; fingerCount = 0; state = 'idle';
  document.getElementById('game-hint').style.opacity = '1';
  document.getElementById('finger-count-badge').textContent = 'Leg vingers neer';
}

function goBack() {
  cancelCountdown(); clearDots();
  touches = {}; fingerCount = 0; state = 'idle';
  showScreen('setup-screen');
}

function playAgain() {
  clearDots();
  touches = {}; fingerCount = 0; state = 'idle';
  showScreen('game-screen');
  document.getElementById('game-hint').style.opacity = '1';
  document.getElementById('finger-count-badge').textContent = 'Leg vingers neer';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── SCOREBOARD ──
function showScore() {
  const list = document.getElementById('score-list');
  list.innerHTML = '';
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) {
    list.innerHTML = '<div class="score-empty">Nog geen rondes gespeeld</div>';
  } else {
    const medals = ['🥇','🥈','🥉'];
    sorted.forEach(([name,wins],i) => {
      const color = players.find(p=>p.name===name)?.color || COLORS[i%COLORS.length];
      const row = document.createElement('div');
      row.className = 'score-row';
      row.innerHTML = `
        <div class="score-rank">${medals[i]||i+1}</div>
        <div class="score-dot" style="background:${color}"></div>
        <div class="score-name">${name}</div>
        <div><span class="score-wins" style="color:${color}">${wins}</span><span class="score-wins-label">wins</span></div>
      `;
      list.appendChild(row);
    });
  }
  showScreen('score-screen');
}

function clearScores() {
  scores = {};
  try{localStorage.removeItem('fp_scores');}catch(e){}
  showScore();
}

function saveScores() {
  try{localStorage.setItem('fp_scores',JSON.stringify(scores));}catch(e){}
}

// ── GAME ──
function getPlayer(idx) {
  if(mode==='names') return players[(idx-1)%players.length];
  return {name:`${idx}`, color:COLORS[(idx-1)%COLORS.length]};
}

function clearDots() {
  document.querySelectorAll('.finger-dot,.ripple-ring').forEach(e=>e.remove());
}

function updateBadge() {
  const n = Object.keys(touches).length;
  const b = document.getElementById('finger-count-badge');
  if(n===0) b.textContent='Leg vingers neer';
  else if(n===1) b.textContent='1 vinger — nog meer!';
  else b.textContent=`${n} vingers — wachten...`;
}

function createDot(x, y, player, idx) {
  const size = mode==='names' ? 86 : 72;
  const dot = document.createElement('div');
  dot.className = 'finger-dot';
  dot.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${player.color}18;border-color:${player.color};box-shadow:0 0 40px ${player.color}44`;
  const num = document.createElement('div');
  num.className = 'dot-number';
  num.style.color = player.color;
  num.textContent = mode==='names' ? idx : player.name;
  dot.appendChild(num);
  if(mode==='names') {
    const nm = document.createElement('div');
    nm.className = 'dot-name';
    nm.textContent = player.name;
    dot.appendChild(nm);
  }
  document.getElementById('game-screen').appendChild(dot);

  const ripple = document.createElement('div');
  ripple.className = 'ripple-ring';
  ripple.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;border-color:${player.color}`;
  document.getElementById('game-screen').appendChild(ripple);
  setTimeout(()=>ripple.remove(), 700);
  return dot;
}

function startCountdown() {
  if(state!=='counting') return;
  if(Object.keys(touches).length<2) return;
  document.getElementById('game-hint').style.opacity = '0';

  const pb = document.getElementById('progress-bar');
  pb.style.display='block'; pb.style.transition='none'; pb.style.width='0%';
  setTimeout(()=>{ pb.style.transition='width 2500ms linear'; pb.style.width='100%'; },20);

  const cd = document.getElementById('countdown-number');
  let count=3; cd.textContent=count; cd.classList.add('show'); soundCountdown();

  const tick = () => {
    count--;
    cd.classList.remove('show');
    setTimeout(()=>{
      if(count<=0){ selectWinner(); return; }
      cd.textContent=count; cd.classList.add('show'); soundCountdown();
      countdownTimer = setTimeout(tick, 833);
    },80);
  };
  countdownTimer = setTimeout(tick, 833);
}

function cancelCountdown() {
  clearTimeout(countdownTimer); countdownTimer=null;
  document.getElementById('countdown-number').classList.remove('show');
  const pb=document.getElementById('progress-bar');
  pb.style.transition='none'; pb.style.width='0%'; pb.style.display='none';
}

function selectWinner() {
  state='selecting';
  const ids = Object.keys(touches);
  if(!ids.length){playAgain();return;}
  const winnerId = ids[Math.floor(Math.random()*ids.length)];
  ids.forEach(id=>{
    touches[id].el.classList.add(id===winnerId?'winner-anim':'loser-anim');
    if(id!==winnerId) soundLoser();
  });
  vibe([30,50,30,50,200]); soundWinner();
  setTimeout(()=>{ showWinner(touches[winnerId]); },600);
}

function showWinner(w) {
  state='winner';
  const avatar=document.getElementById('winner-avatar');
  const num=document.getElementById('winner-avatar-num');
  const name=document.getElementById('winner-avatar-name');
  const title=document.getElementById('winner-title');

  avatar.style.borderColor=w.player.color;
  avatar.style.background=w.player.color+'15';
  avatar.style.boxShadow=`0 0 60px ${w.player.color}44`;
  num.textContent=mode==='names'?w.fingerIdx:w.player.name;
  num.style.color=w.player.color;

  if(mode==='names'){
    name.style.display='block'; name.textContent=w.player.name;
    title.textContent=w.player.name;
  } else {
    name.style.display='none';
    title.textContent=`Vinger ${w.player.name}`;
  }
  title.style.color=w.player.color;

  // Score bijhouden
  const key = mode==='names' ? w.player.name : `Vinger ${w.player.name}`;
  scores[key]=(scores[key]||0)+1;
  saveScores();

  showScreen('winner-screen');
  spawnConfetti(w.player.color);
}

function spawnConfetti(c) {
  const cols=[...COLORS,c,c,c];
  for(let i=0;i<100;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='confetti-piece';
      const s=Math.random()*10+5;
      p.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${Math.random()*1.5+1.5}s;animation-delay:${Math.random()*0.3}s`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),3500);
    },i*12);
  }
}

// ── TOUCH ──
const gameScreen = document.getElementById('game-screen');

document.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(state==='winner'||state==='selecting') return;
  if(gameScreen.classList.contains('hidden')) return;
  cancelCountdown();
  if(state==='idle') state='counting';
  Array.from(e.changedTouches).forEach(t=>{
    if(touches[t.identifier]) return;
    fingerCount++;
    const player=getPlayer(fingerCount);
    const dot=createDot(t.clientX,t.clientY,player,fingerCount);
    touches[t.identifier]={x:t.clientX,y:t.clientY,el:dot,player,fingerIdx:fingerCount};
    soundTap(); vibe(15);
  });
  updateBadge();
  if(Object.keys(touches).length>=2) startCountdown();
},{passive:false});

document.addEventListener('touchmove', e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    const touch=touches[t.identifier];
    if(!touch) return;
    touch.el.style.left=t.clientX+'px';
    touch.el.style.top=t.clientY+'px';
  });
},{passive:false});

document.addEventListener('touchend', e=>{
  e.preventDefault();
  if(state==='selecting'||state==='winner') return;
  if(gameScreen.classList.contains('hidden')) return;
  cancelCountdown();
  document.getElementById('game-hint').style.opacity='1';
  Array.from(e.changedTouches).forEach(t=>{
    const touch=touches[t.identifier];
    if(!touch) return;
    touch.el.style.animation='loser-out 0.2s ease forwards';
    setTimeout(()=>touch.el.remove(),200);
    delete touches[t.identifier];
  });
  updateBadge();
  const n=Object.keys(touches).length;
  if(n===0){state='idle';fingerCount=0;}
  else if(n>=2) startCountdown();
},{passive:false});

document.addEventListener('touchcancel',e=>e.preventDefault(),{passive:false});
</script>
</body>
</html>
